<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agendamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .selecionado {
            background-color: #6366f1 !important;
            /* indigo-500 */
            color: white !important;
            font-weight: bold;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-900 text-white font-sans p-6 flex justify-center align-items-center">

    <div class="w-full max-w-3xl">

        <!-- Barbeiros -->
        <div class="flex flex-wrap justify-around gap-4 mb-6">
            <div class="flex items-center gap-2">
                <span class="text-gray-300 text-2xl">👤</span>
                <div>
                    <p>Diogo</p>
                    <p class="text-yellow-400 text-sm">★★★★★</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-gray-300 text-2xl">👤</span>
                <div>
                    <p>Henrique</p>
                    <p class="text-yellow-400 text-sm">★★★★★</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-gray-300 text-2xl">👤</span>
                <div>
                    <p>Erick</p>
                    <p class="text-yellow-400 text-sm">★★★★★</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-gray-300 text-2xl">👤</span>
                <div>
                    <p>Heber</p>
                    <p class="text-yellow-400 text-sm">★★★★★</p>
                </div>
            </div>
        </div>

        <!-- Escolha o dia -->
        <div class="bg-gray-800 rounded-xl p-4 mb-6">
            <h2 class="text-xl font-bold text-white mb-4">Escolha o dia</h2>
            <div id="dias" class="flex gap-2 overflow-x-auto scrollbar-hide pb-1">
                <div class="bg-gray-700 rounded-lg px-4 py-2 text-center cursor-pointer min-w-[70px]">SEG<br>16</div>
                <div class="bg-gray-700 rounded-lg px-4 py-2 text-center cursor-pointer min-w-[70px]">TER<br>17</div>
                <div class="bg-gray-700 rounded-lg px-4 py-2 text-center cursor-pointer min-w-[70px]">QUA<br>18</div>
                <div class="bg-gray-700 rounded-lg px-4 py-2 text-center cursor-pointer min-w-[70px]">QUI<br>19</div>
                <div class="bg-gray-700 rounded-lg px-4 py-2 text-center cursor-pointer min-w-[70px]">SEX<br>20</div>
                <div class="bg-gray-700 rounded-lg px-4 py-2 text-center cursor-pointer min-w-[70px]">SAB<br>21</div>
            </div>
        </div>

        <!-- Escolha o horário -->
        <div class="bg-gray-800 rounded-xl p-4 mb-6">
            <h2 class="text-xl font-bold text-white mb-4">Escolha o horário</h2>
            <div class="grid grid-cols-4 sm:grid-cols-4 gap-2 text-center" id="horarios">
                <!-- Horários de exemplo -->
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">09h00</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">09h30</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">10h00</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">10h30</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">11h00</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">11h30</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">12h00</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">12h30</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">13h00</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">14h00</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">14h30</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">15h00</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">15h30</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">16h00</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">16h30</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">17h00</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">17h30</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">18h00</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">18h30</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">19h00</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">19h30</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">20h00</div>
                <div class="bg-gray-700 rounded-lg py-1 cursor-pointer">20h30</div>
            </div>
        </div>

        <!-- Botão agendar -->
        <div class="text-center">
            <button
                class="bg-indigo-600 hover:bg-indigo-700 transition text-white font-bold py-2 px-8 rounded-full w-full sm:w-auto">
                AGENDAR
            </button>
        </div>

    </div>

    <script>
        // Selecionar dias
        const dias = document.querySelectorAll('#dias > div');
        dias.forEach(dia => {
            dia.addEventListener('click', () => {
                dias.forEach(d => d.classList.remove('selecionado'));
                dia.classList.add('selecionado');
            });
        });

        // Selecionar horários
        const horarios = document.querySelectorAll('#horarios > div');
        horarios.forEach(horario => {
            horario.addEventListener('click', () => {
                horarios.forEach(h => h.classList.remove('selecionado'));
                horario.classList.add('selecionado');
            });
        });
    </script>
</body>

</html>
